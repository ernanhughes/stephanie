[project]
name = "stephanie"
version = "0.1.0"
description = "Stephanie: A local memory engine for AI-assisted thinking"
authors = [{name = "Ernan Hughes", email = "ernanhughes@gmail.com"}]
license = {text = "MIT"}
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
  "PySide6",
  "psycopg2-binary",
  "hydra-core",
  "numpy",
  "ollama"
]

[project.scripts]
stephanie = "stephanie.main_window:main"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"
