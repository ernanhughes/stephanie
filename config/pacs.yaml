embeddings:
  backend: hnet

    # How would you architect a continual-learning CBR loop (retrieve→reuse→revise) so the system improves with every research task it completes?”
    # Propose a CBR framework that mines past traces, ranks them, and adapts them to new goals, enabling lifelong learning for complex research workflows.”
    # Outline a case-based planner that reuses successful plans, scores results, and updates its memory to solve increasingly challenging research objectives.”
    # Give me a step-by-step method to build a CBR system that retrieves similar cases, adapts them, and logs outcomes to steadily raise performance on research tasks.”
    # What would a scalable CBR architecture look like for an autonomous research agent that continuously learns from prior experiments and plans?”
    # Explain how to implement retrieval + adaptation + retention so a CBR agent can handle harder research problems over time using its own history.”
    # How can a research assistant use CBR to select relevant past plans, adapt them, and record feedback signals to drive continual improvement?”
    # Propose an evaluation-first CBR loop where past cases are ranked by similarity and value, adapted to a new goal, and the results are persisted for future reuse.”
    # Describe a practical blueprint for a CBR-based planner that leverages embeddings, ranking, and revision to iteratively improve at open-ended research tasks.”
    # How can I use Case-Based Reasoning (CBR) to build a system that continually learns

goal:
  goal_text: >
    Describe a practical blueprint for a CBR-based planner that leverages embeddings, ranking, and revision to iteratively improve at open-ended research tasks.
  goal_type: "strategic"
  goal_category: "meta_reasoning"
  focus_area: "case_based_learning"
  strategy: "retrieve_reuse_revise_retain"
  difficulty: "high"
  expected_formats:
    - "case_trace"
    - "scorable_rankings"
    - "revised_plan"
    - "retained_cartridge"


paths:
  prompts: ${hydra:runtime.cwd}/prompts

report:
  generate_report: true
  path: ${hydra:runtime.cwd}/reports

web_search:
  engine: "searxng"
Right here  instance_url: "http://localhost:8080"

pipeline:
  name: cbr
  tag: cbr
  description: >
    Implementation of the PACS framework from the 
    Memento paper (https://arxiv.org/pdf/2508.16153).
    This pipeline demonstrates the full CBR loop — retrieve, reuse, revise, retain —
    by grounding reasoning in past cases (PlanTraces, evaluations, scorables),
    adapting them to new tasks, and storing new cases for continual self-improvement.

  stages:
     - name: knowledge_db_loader
       description: "Load prior retained knowledge from the database for retrieval"
       cls: stephanie.agents.knowledge.knowledge_db_loader.KnowledgeDBLoaderAgent
       enabled: true
       iterations: 1    

     - name: seed_casebook
       description: "🗂️ Prepare: load and prepare CaseBook for training"
       cls: stephanie.agents.pacs.seed_casebook.SeedCaseBookAgent
       enabled: false
       iterations: 1


     - name: casebook_preparation
       description: "🗂️ Prepare: load and prepare CaseBook for training"
       cls: stephanie.agents.pacs.casebook_preparation.CaseBookPreparationAgent
       enabled: true
       iterations: 1 

     - name: pacs_training
       description: "🗂️ Purpose: Train the model using the PACS algorithm"
       cls: stephanie.agents.pacs.pacs_training.PACSTrainingAgent
       enabled: false
       iterations: 1

     - name: skill_extraction
       description: "🗂️ Purpose: Validate that weight-space and VPM-space deltas align"
       cls: stephanie.agents.pacs.skill_extraction.SkillExtractionAgent
       enabled: false
       iterations: 1

     - name: skill_validation
       description: "🗂️ Purpose: Validate that weight-space and VPM-space deltas align
       cls: stephanie.agents.pacs.skill_validation.SkillValidationAgent
       enabled: false
       iterations: 1
     - name: skill_filter
       description: "🗂️ Prepare: load and prepare Skill Filters for training"
       cls: stephanie.agents.pacs.filter_bank.FilterBankAgent
       enabled: false
       iterations: 1

