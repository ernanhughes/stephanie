goal:
  goal_text: >
    Test retention policies in CBR by comparing outcomes when keeping all
    traces, keeping only the top-K traces, or discarding failed ones.
  goal_type: "experimental"
  goal_category: "system_behavior"
  focus_area: "retention_policy"
  strategy: "keep_all_vs_prune"
  difficulty: "medium"
  expected_formats:
    - "case_trace_set"
    - "policy_comparison"
    - "retention_report"

