planner_reuse:
  name: planner_reuse
  enabled: true
  save_prompt: true
  save_context: false
  skip_if_completed: false

  top_k: 500
  min_hrm: 0.6
  use_db_knn: true
  rerank_with_scorable_ranker: false

  dimensions: 
    - alignment
    - clarity
    - implementability
    - novelty
    - relevance

  model:
    name: ollama/qwen3
    api_base: http://localhost:11434
    api_key: null
  input_keys: ["goal", "hypotheses"]
  input_key: documents
  output_key: planner_reuse
  prompt_mode: file
  prompt_file: planner_reuse.txt